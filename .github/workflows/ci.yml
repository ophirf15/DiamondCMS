name: CI

on:
  push:
  pull_request:

env:
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: diamondcms
  DB_USERNAME: diamondcms
  DB_PASSWORD: diamondcms_local

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:11
        env:
          MARIADB_DATABASE: diamondcms
          MARIADB_USER: diamondcms
          MARIADB_PASSWORD: diamondcms_local
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      # setup-php has no v3 tag — current major is v2
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, pdo_mysql, gd, zip, intl, fileinfo
          coverage: none
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: php artisan migrate --force
      - run: vendor/bin/pint --test
      - run: vendor/bin/phpstan analyse --memory-limit=1G
      - run: php artisan test
      - run: npm run build

  release-package:
    name: Build installable ZIP
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, pdo_mysql, gd, zip, intl, fileinfo
          coverage: none
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - name: Build release ZIP
        run: php scripts/build-release.php
      - name: Upload install package
        uses: actions/upload-artifact@v4
        with:
          name: diamondcms-release
          path: |
            storage/app/releases/diamondcms-*.zip
            storage/app/releases/diamondcms-*.zip.sha256
          if-no-files-found: error
          retention-days: 30
